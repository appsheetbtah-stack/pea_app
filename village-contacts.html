<style>
:root {
  --bg: #0f1923; --surface: #162030; --surface2: #1e2d3d; --border: #2a3f55;
  --accent: #f5a623; --blue: #3b9ede; --green: #2ecc71; --text: #e8f0f8; --text2: #8aa0b8;
  --sans: 'Sarabun', sans-serif; --mono: 'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin:0; padding:0; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }

/* === TOP BAR === */
.topbar {
  position: sticky; top: 0; z-index: 50; background: var(--surface);
  border-bottom: 1px solid var(--border); padding: 14px 18px;
  display: flex; align-items: center; gap: 10px;
}
.back-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-size: 18px; width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; text-decoration: none; flex-shrink: 0;
}
.topbar-badge { background: var(--accent); color:#000; font-family: var(--mono); font-weight:700; font-size:12px; padding:3px 8px; border-radius:4px; }
.topbar-title { font-size: 14.5px; font-weight: 600; flex: 1; }
.topbar-count { font-size: 12px; color: var(--text2); flex-shrink: 0; }

/* === SEARCH + FILTER === */
.search-section { padding: 14px 16px 0; }
.search-input {
  width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
  font-family: var(--sans); font-size: 14px; padding: 12px 16px; border-radius: 10px; outline: none;
  margin-bottom: 12px;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text2); }
.filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.filter-btn {
  flex-shrink: 0; border: 1px solid var(--border); background: var(--surface); color: var(--text2);
  font-family: var(--sans); font-size: 13px; font-weight: 600; padding: 7px 13px;
  border-radius: 20px; cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.filter-btn.active { border-color: var(--accent); background: rgba(245,166,35,0.12); color: var(--accent); }

/* === CARDS === */
.list { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 15px; display: flex; align-items: center; gap: 14px;
}
.avatar {
  width: 46px; height: 46px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700;
}
.avatar-kamnan { background: rgba(245,166,35,0.2); color: var(--accent); }
.avatar-puyai { background: rgba(59,158,222,0.15); color: var(--blue); }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 14.5px; font-weight: 600; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-role-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.role-badge {
  font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 8px; flex-shrink: 0;
}
.role-kamnan { background: rgba(245,166,35,0.15); color: var(--accent); }
.role-puyai { background: rgba(59,158,222,0.12); color: var(--blue); }
.card-moo { font-size: 12.5px; color: var(--text2); }
.card-tel { font-family: var(--mono); font-size: 12.5px; color: var(--text2); }
.call-btn {
  width: 42px; height: 42px; background: var(--green); border: none; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 18px;
  text-decoration: none; flex-shrink: 0; transition: opacity 0.15s;
}
.call-btn:active { opacity: 0.7; }
.avatar-pending { background: rgba(139,139,139,0.15); color: var(--text2); }
.card.pending { border-style: dashed; opacity: 0.75; }

.empty { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 14px; }
.empty .icon { font-size: 40px; margin-bottom: 10px; }
.loading { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 14px; }

/* === CARD EDIT/DELETE BUTTONS === */
.card-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.icon-btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
  width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.icon-btn:active { border-color: var(--accent); color: var(--accent); }
.icon-btn.del:active { border-color: #e74c3c; color: #e74c3c; }

/* === FAB === */
.fab {
  position: fixed; right: 18px; bottom: 24px; width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #e05c2a); border: none; color: #0f1923;
  font-size: 26px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 16px rgba(245,166,35,.4);
  display: flex; align-items: center; justify-content: center; z-index: 100;
}
.fab:active { transform: scale(.93); }
body { padding-bottom: 90px; }

/* === MODAL === */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200;
  display: none; align-items: flex-end; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--surface); width: 100%; max-width: 480px; border-radius: 18px 18px 0 0;
  max-height: 88vh; display: flex; flex-direction: column; animation: slideUp .2s ease;
}
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-header {
  display: flex; align-items: center; justify-content: space-between; padding: 18px 18px 12px;
  border-bottom: 1px solid var(--border);
}
.modal-header span { font-size: 16px; font-weight: 700; }
.modal-close {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
  width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 14px;
}
.modal-body { padding: 16px 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
.field-label { font-size: 12.5px; color: var(--text2); margin-bottom: 6px; display: block; }
.field-input, .field-select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--sans); font-size: 14.5px; padding: 11px 12px; border-radius: 8px; outline: none;
}
.field-input:focus, .field-select:focus { border-color: var(--accent); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-footer { display: flex; gap: 10px; padding: 14px 18px; border-top: 1px solid var(--border); }
.btn-cancel, .btn-save {
  flex: 1; padding: 12px; border-radius: 8px; font-family: var(--sans); font-size: 14px;
  font-weight: 600; cursor: pointer; border: 1px solid var(--border);
}
.btn-cancel { background: var(--surface2); color: var(--text2); }
.btn-save { background: var(--accent); color: #0f1923; border: none; }
.btn-save:disabled { opacity: .5; }

.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--surface2); border: 1px solid var(--border); padding: 10px 18px;
  border-radius: 20px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity .2s;
  pointer-events: none;
}
.toast.show { opacity: 1; }
</style>

  }

    if (d.name === 'รอข้อมูล') return '?';
    return d.moo === '?' ? '?' : 'ม.' + d.moo;
  }

  function avatarFontSize(moo) {
    return moo === '?' || moo.length <= 2 ? '14px' : '12px';
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }
  window.setFilter = setFilter;

  function render() {
    const q = document.getElementById('search-input').value.trim().toLowerCase();
    const filtered = DATA.filter(d => {
      const isExtra = !MAIN_TAMBONS.includes(d.tambon);
      if (currentFilter === 'extra') return isExtra;
      const matchFilter = currentFilter === 'all' || d.tambon === currentFilter;
      if (!matchFilter) return false;
      if (currentFilter !== 'all' && isExtra) return false;
      if (!q) return true;
      return [d.name, d.village, d.tel, d.tambon, 'หมู่'+d.moo, d.role, d.amphoe||'', d.changwat||''].some(v => (v||'').toLowerCase().includes(q));

    });

      return `
        <div class="card${isPending(d)?' pending':''}">
          <div class="avatar ${isKamnan ? 'avatar-kamnan' : isPending(d) ? 'avatar-pending' : 'avatar-puyai'}" style="font-size:${fontSize};font-family:var(--mono);letter-spacing:-0.5px;">${avatar}</div>
          <div class="card-info">
            <div class="card-name">${isPending(d) ? '<span style="color:var(--text2);font-style:italic;">รอข้อมูล</span>' : d.name}</div>
            <div class="card-role-row">
              <span class="role-badge ${isKamnan ? 'role-kamnan' : 'role-puyai'}">${d.role}</span>
              <span class="card-moo">${location}</span>
            </div>
            <div class="card-tel">${d.tel || (isPending(d) ? '— รอข้อมูล' : '—')}</div>
          </div>
          <div class="card-actions">
            <button class="icon-btn" onclick="window.editItem('${d._id}')">✏️</button>
            <button class="icon-btn del" onclick="window.deleteItem('${d._id}')">🗑️</button>
          </div>
          ${callBtn}
        </div>`;
    }).join('');
  }
  window.render = render;

  async function loadData() {
    try {
      const snap = await getDocs(collection(db, COLLECTION));
      if (snap.empty) {
        // ครั้งแรก — seed ข้อมูลเดิมเข้า Firestore อัตโนมัติ
        await seedData();
        return;
      }
      DATA = snap.docs.map(d => ({ ...d.data(), _id: d.id }));
      render();
    } catch (e) {
      console.error(e);
      document.getElementById('list').innerHTML = '<div class="empty"><div class="icon">⚠️</div>โหลดข้อมูลไม่สำเร็จ กรุณาลองใหม่</div>';
      document.getElementById('count-text').textContent = 'เกิดข้อผิดพลาด';
    }
  }

  async function seedData() {
    document.getElementById('list').innerHTML = '<div class="loading">กำลังตั้งค่าข้อมูลเริ่มต้น...</div>';
    try {
      const batch = writeBatch(db);
      SEED_DATA.forEach(item => {
        const ref = doc(collection(db, COLLECTION));
        batch.set(ref, item);
      });
      await batch.commit();
      await loadData();
    } catch (e) {
      console.error(e);
      document.getElementById('list').innerHTML = '<div class="empty"><div class="icon">⚠️</div>ตั้งค่าข้อมูลเริ่มต้นไม่สำเร็จ</div>';
    }
  }

  // ── MODAL FORM ──
  window.openForm = function() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'เพิ่มรายชื่อใหม่';
    document.getElementById('f-tambon').value = '';
    document.getElementById('f-moo').value = '';
    document.getElementById('f-village').value = '';
    document.getElementById('f-name').value = '';
    document.getElementById('f-role').value = 'ผู้ใหญ่บ้าน';
    document.getElementById('f-tel').value = '';
    document.getElementById('f-amphoe').value = '';
    document.getElementById('f-changwat').value = '';
    overlay.classList.add('open');
  };

  window.closeForm = function() {
    overlay.classList.remove('open');
  };

  window.editItem = function(id) {
    const d = DATA.find(x => x._id === id);
    if (!d) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'แก้ไขข้อมูล';
    document.getElementById('f-tambon').value = d.tambon || '';
    document.getElementById('f-moo').value = d.moo || '';
    document.getElementById('f-village').value = d.village || '';
    document.getElementById('f-name').value = d.name || '';
    document.getElementById('f-role').value = d.role || 'ผู้ใหญ่บ้าน';
    document.getElementById('f-tel').value = d.tel || '';
    document.getElementById('f-amphoe').value = d.amphoe || '';
    document.getElementById('f-changwat').value = d.changwat || '';
    overlay.classList.add('open');
  };

  window.saveItem = async function() {
    const tambon = document.getElementById('f-tambon').value.trim();
    const moo = document.getElementById('f-moo').value.trim();
    const village = document.getElementById('f-village').value.trim();
    const name = document.getElementById('f-name').value.trim();
    const role = document.getElementById('f-role').value;
    const tel = document.getElementById('f-tel').value.trim();
    const amphoe = document.getElementById('f-amphoe').value.trim();
    const changwat = document.getElementById('f-changwat').value.trim();

    if (!tambon || !moo || !name) {
      showToast('กรุณากรอกตำบล หมู่ที่ และชื่อ-นามสกุล');
      return;
    }

    const payload = { tambon, moo, village, name, role, tel };
    if (amphoe) payload.amphoe = amphoe;
    if (changwat) payload.changwat = changwat;

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'กำลังบันทึก...';

    try {
      if (editingId) {
        await updateDoc(doc(db, COLLECTION, editingId), payload);
        const idx = DATA.findIndex(d => d._id === editingId);
        if (idx > -1) DATA[idx] = { ...DATA[idx], ...payload };
        showToast('บันทึกการแก้ไขแล้ว');
      } else {
        const docRef = await addDoc(collection(db, COLLECTION), payload);
        DATA.push({ _id: docRef.id, ...payload });
        showToast('เพิ่มรายชื่อใหม่แล้ว');
      }
      closeForm();
      render();
    } catch (e) {
      console.error(e);
      showToast('บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง');
    } finally {
      btn.disabled = false;
      btn.textContent = 'บันทึก';
    }
  };

  window.deleteItem = async function(id) {
    const d = DATA.find(x => x._id === id);
    if (!d) return;
    if (!confirm(`ยืนยันลบ "${d.name}" (ม.${d.moo} ${d.tambon})?`)) return;
    try {
      await deleteDoc(doc(db, COLLECTION, id));
      DATA = DATA.filter(x => x._id !== id);
      render();
      showToast('ลบรายการแล้ว');
    } catch (e) {
      console.error(e);
      showToast('ลบไม่สำเร็จ ลองใหม่อีกครั้ง');
    }
  };

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeForm();
  });

  loadData();
</script>
</body>
</html>
