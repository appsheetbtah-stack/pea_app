<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อัปเดตสถานะ Ticket - PEA</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1923">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f1923;
  --surface: #162030;
  --surface2: #1e2d3d;
  --border: #2a3f55;
  --accent: #f5a623;
  --accent2: #e05c2a;
  --blue: #3b9ede;
  --green: #2ecc71;
  --red: #e74c3c;
  --yellow: #f39c12;
  --text: #e8f0f8;
  --text2: #8aa0b8;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'Sarabun', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--sans);
  font-size: 15px; min-height: 100vh; display: flex; align-items: flex-start;
  justify-content: center; padding: 24px 16px;
}
.card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  max-width: 460px; width: 100%; overflow: hidden;
}
.card-header {
  padding: 20px 22px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px;
}
.logo-badge {
  background: var(--accent); color: #000; font-family: var(--mono); font-weight: 600;
  font-size: 13px; padding: 4px 9px; border-radius: 4px; letter-spacing: 1px;
}
.card-title { font-size: 15px; font-weight: 600; color: var(--text2); }
.card-body { padding: 22px; }

.state-loading, .state-error {
  text-align: center; padding: 40px 20px; color: var(--text2);
}
.state-error .icon { font-size: 42px; margin-bottom: 12px; }
.state-error .msg { font-size: 16px; font-weight: 600; color: var(--red); margin-bottom: 6px; }
.state-error .sub { font-size: 13px; color: var(--text2); }

.ticket-id-row {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
}
.ticket-id { font-family: var(--mono); font-size: 20px; font-weight: 600; color: var(--accent); }
.status-pill {
  font-size: 12px; font-weight: 600; padding: 4px 11px; border-radius: 20px;
  display: inline-flex; align-items: center; gap: 5px;
}
.status-open { background: rgba(231,76,60,0.15); color: var(--red); }
.status-progress { background: rgba(243,156,18,0.15); color: var(--yellow); }
.status-done { background: rgba(46,204,113,0.15); color: var(--green); }

.info-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 22px; }
.info-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; }
.info-key { font-size: 11px; color: var(--text2); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.info-val { font-size: 14.5px; line-height: 1.45; }
.info-val.mono { font-family: var(--mono); }

.section-label { font-size: 12px; color: var(--text2); margin-bottom: 10px; font-weight: 600; }

.status-buttons { display: flex; flex-direction: column; gap: 9px; margin-bottom: 8px; }
.status-btn {
  border: 1px solid var(--border); background: var(--surface2); color: var(--text);
  font-family: var(--sans); font-size: 14.5px; font-weight: 600; padding: 13px 16px;
  border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px;
  transition: all 0.15s ease;
}
.status-btn:active { transform: scale(0.98); }
.status-btn.current { border-color: var(--accent); background: rgba(245,166,35,0.1); }
.status-btn .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.dot-open { background: var(--red); }
.dot-progress { background: var(--yellow); }
.dot-done { background: var(--green); }
.status-btn .check { margin-left: auto; color: var(--accent); font-size: 16px; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 999;
  transition: transform 0.25s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }

.map-link {
  display: inline-flex; align-items: center; gap: 6px; color: var(--blue);
  text-decoration: none; font-size: 13.5px; margin-top: 4px;
}

.repair-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
.field-group { margin-bottom: 20px; }
.field-label { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 9px; }

.custom-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--sans); font-size: 14px; padding: 11px 13px; border-radius: 9px;
  margin-top: 8px; outline: none;
}
.custom-input:focus { border-color: var(--accent); }
.custom-input::placeholder { color: var(--text2); }

/* ===== Picker box (สรุปรายการที่เลือก, แตะเพื่อเปิด popup) ===== */
.picker-box {
  border: 1px solid var(--border); background: var(--surface2); border-radius: 10px;
  padding: 13px 15px; display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; gap: 10px; transition: border-color 0.15s ease;
}
.picker-box:active { border-color: var(--accent); }
.picker-text { font-size: 14px; line-height: 1.5; }
.picker-text.empty { color: var(--text2); }
.picker-plus {
  width: 26px; height: 26px; border-radius: 50%; background: var(--accent); color: #000;
  display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0;
  font-weight: 700;
}

/* ===== Fullscreen popup picker ===== */
.popup-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500;
}
.popup-overlay.show { display: block; }
.popup-sheet {
  display: none; position: fixed; left: 0; right: 0; bottom: 0; top: 8%;
  background: var(--surface); border-radius: 18px 18px 0 0; z-index: 501;
  flex-direction: column; max-width: 460px; margin: 0 auto;
}
.popup-sheet.show { display: flex; }
.popup-header { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.popup-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
.popup-search-row { display: flex; gap: 8px; }
.popup-search {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  font-family: var(--sans); font-size: 14px; padding: 11px 14px; border-radius: 10px; outline: none;
}
.popup-search:focus { border-color: var(--accent); }
.popup-add-btn {
  flex-shrink: 0; background: var(--accent); color: #000; border: none;
  font-family: var(--sans); font-size: 13.5px; font-weight: 700; padding: 0 16px;
  border-radius: 10px; cursor: pointer;
}
.popup-add-btn:active { opacity: 0.8; }
.popup-list { flex: 1; overflow-y: auto; padding: 6px 0; -webkit-overflow-scrolling: touch; }
.popup-item-wrap { border-bottom: 1px solid rgba(255,255,255,0.04); }
.popup-item {
  display: flex; align-items: center; gap: 14px; padding: 14px 18px; cursor: pointer;
}
.popup-item:active { background: var(--surface2); }
.popup-checkbox {
  width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 5px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 13px;
  color: #000;
}
.popup-item.checked .popup-checkbox { background: var(--accent); border-color: var(--accent); }
.popup-item.checked { background: rgba(245,166,35,0.06); }
.popup-item-label { font-size: 14.5px; flex: 1; }
.popup-empty { padding: 24px 18px; color: var(--text2); font-size: 13.5px; text-align: center; }

/* แถวจำนวน/หน่วย ของวัสดุ ที่แทรกใต้รายการที่ติ๊กแล้ว */
.popup-qty-row {
  display: flex; align-items: center; gap: 8px; padding: 4px 18px 12px 54px;
}
.popup-qty-row input[type="number"] {
  width: 64px; background: var(--bg); border: 1px solid var(--border); color: var(--text);
  font-family: var(--mono); font-size: 14px; padding: 7px 6px; border-radius: 6px;
  text-align: center; outline: none;
}
.popup-qty-row input[type="number"]:focus { border-color: var(--accent); }
.popup-qty-row .qty-unit { font-size: 12.5px; color: var(--text2); }

.popup-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px; border-top: 1px solid var(--border); flex-shrink: 0;
}
.popup-clear { color: var(--text2); font-size: 14px; background:none; border:none; cursor:pointer; padding: 8px; }
.popup-done { color: var(--accent); font-size: 15px; font-weight: 700; background:none; border:none; cursor:pointer; padding: 8px; }

.save-btn {
  width: 100%; background: var(--blue); color: #fff; border: none;
  font-family: var(--sans); font-size: 14.5px; font-weight: 600; padding: 13px;
  border-radius: 10px; cursor: pointer; margin-top: 18px;
}
.save-btn:active { transform: scale(0.98); }
.save-btn:disabled { opacity: 0.6; }
</style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <span class="logo-badge">PEA</span>
    <span class="card-title">อัปเดตสถานะแจ้งเหตุไฟดับ</span>
  </div>
  <div class="card-body" id="card-body">
    <div class="state-loading">กำลังโหลดข้อมูล...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="popup-overlay" id="popup-overlay" onclick="closePicker()"></div>
<div class="popup-sheet" id="popup-sheet">
  <div class="popup-header">
    <div class="popup-title" id="popup-title">เลือกรายการ</div>
    <div class="popup-search-row">
      <input type="text" class="popup-search" id="popup-search" placeholder="ค้นหา หรือพิมพ์รายการใหม่..." oninput="filterPicker()">
      <button class="popup-add-btn" id="popup-add-btn" onclick="addCustomItem()">เพิ่ม</button>
    </div>
  </div>
  <div class="popup-list" id="popup-list"></div>
  <div class="popup-footer">
    <button class="popup-clear" onclick="clearPicker()">Clear</button>
    <button class="popup-done" onclick="closePicker()">Done</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC7bzImCV7c89fLGhIq8OycWKQWRYdvZvE",
    authDomain: "pea-system.firebaseapp.com",
    projectId: "pea-system",
    storageBucket: "pea-system.firebasestorage.app",
    messagingSenderId: "1006235611544",
    appId: "1:1006235611544:web:a7453d71ff56748166fbed",
    measurementId: "G-V5NPYZ4KZW"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const ticketId = params.get('id');
  const token = params.get('token');

  const body = document.getElementById('card-body');
  const toastEl = document.getElementById('toast');

  function showToast(msg, type='') {
    toastEl.textContent = msg;
    toastEl.className = 'toast show ' + type;
    setTimeout(() => { toastEl.className = 'toast'; }, 2800);
  }

  function renderError(title, sub) {
    body.innerHTML = `
      <div class="state-error">
        <div class="icon">⚠️</div>
        <div class="msg">${title}</div>
        <div class="sub">${sub}</div>
      </div>`;
  }

  function statusLabel(s) {
    return s === 'open' ? '🔴 รอดำเนินการ' : s === 'progress' ? '🟡 กำลังดำเนินการ' : '🟢 แก้ไขแล้ว';
  }

  // ===== ตัวเลือกสำเร็จรูป =====
  const CAUSE_OPTIONS = ['สายไฟขาด','ฟิวส์ขาด','หม้อแปลงเสีย/ระเบิด','ลูกถ้วยแตก/ชำรุด','ต้นไม้ทับสาย','อุปกรณ์ป้องกันทำงาน (Recloser/Cutout)','สายหลุดจากจุดต่อ','มิเตอร์ชำรุด','ภัยธรรมชาติ (พายุ/ฟ้าผ่า)'];
  const FIX_OPTIONS = ['เปลี่ยนฟิวส์','ต่อสายใหม่/ซ่อมจุดต่อ','เปลี่ยนลูกถ้วย','ตัดกิ่งไม้/ต้นไม้','Reset อุปกรณ์ป้องกัน','เปลี่ยนหม้อแปลง','เปลี่ยนมิเตอร์','ปรับตั้งค่าใหม่'];
  const MATERIAL_OPTIONS = [
    {name:'ฟิวส์', unit:'ตัว'},
    {name:'สาย', unit:'เมตร'},
    {name:'ลูกถ้วย', unit:'ตัว'},
    {name:'เทปพันสาย', unit:'ม้วน'},
    {name:'คัทเอาท์', unit:'ตัว'},
    {name:'หม้อแปลง', unit:'เครื่อง'},
    {name:'มิเตอร์', unit:'เครื่อง'},
    {name:'อุปกรณ์ต่อสาย (Connector/Sleeve)', unit:'ตัว'}
  ];

  // ===== state ของฟอร์มซ่อมบำรุง =====
  let selectedCauses = [];
  let customCauses = []; // รายการที่พิมพ์เองและไม่อยู่ใน preset (เก็บแยกเพื่อแสดงใน popup ด้วย)
  let selectedFixes = [];
  let customFixes = [];
  let selectedMaterials = []; // [{name, unit, qty}]

  let currentPickerType = null; // 'cause' | 'fix' | 'material'

  const PICKER_CONFIG = {
    cause: { title: 'สาเหตุที่ทำให้ไฟฟ้าขัดข้อง', options: CAUSE_OPTIONS, hasQty: false },
    fix: { title: 'วิธีแก้ไข', options: FIX_OPTIONS, hasQty: false },
    material: { title: 'วัสดุ/อุปกรณ์ที่ใช้', options: MATERIAL_OPTIONS.map(m=>m.name), hasQty: true }
  };

  function getSelectedList(type) {
    if(type === 'cause') return selectedCauses;
    if(type === 'fix') return selectedFixes;
    return selectedMaterials.map(m => m.name);
  }

  function getCustomList(type) {
    if(type === 'cause') return customCauses;
    if(type === 'fix') return customFixes;
    // วัสดุ: รายการ custom คือชื่อใน selectedMaterials ที่ไม่ได้อยู่ใน preset
    return selectedMaterials.map(m => m.name);
  }

  function getAllOptions(type) {
    const base = PICKER_CONFIG[type].options;
    const customs = getCustomList(type).filter(c => !base.includes(c));
    return [...base, ...customs];
  }

  function isSelected(type, name) {
    return getSelectedList(type).includes(name);
  }

  function getMaterialUnit(name) {
    const preset = MATERIAL_OPTIONS.find(m => m.name === name);
    if(preset) return preset.unit;
    const existing = selectedMaterials.find(m => m.name === name);
    return existing ? existing.unit : 'หน่วย';
  }

  function toggleSelection(type, name) {
    if(type === 'material') {
      const idx = selectedMaterials.findIndex(m => m.name === name);
      if(idx >= 0) {
        selectedMaterials.splice(idx, 1);
      } else {
        selectedMaterials.push({ name, unit: getMaterialUnit(name), qty: 1 });
      }
      return;
    }
    const list = type === 'cause' ? selectedCauses : selectedFixes;
    const idx = list.indexOf(name);
    if(idx >= 0) list.splice(idx, 1); else list.push(name);
  }

  function updateMaterialQty(name, qty) {
    const m = selectedMaterials.find(x => x.name === name);
    if(m) m.qty = isNaN(qty) ? 0 : qty;
  }

  function summaryText(type) {
    const list = getSelectedList(type);
    if(type === 'material') {
      return selectedMaterials.length
        ? selectedMaterials.map(m => `${m.name} (${m.qty} ${m.unit})`).join(', ')
        : '';
    }
    return list.join(', ');
  }

  function updateAllSummaries() {
    ['cause','fix','material'].forEach(type => {
      const el = document.getElementById('summary-' + type);
      if(!el) return;
      const text = summaryText(type);
      if(text) {
        el.textContent = text;
        el.classList.remove('empty');
      } else {
        el.textContent = 'ยังไม่ได้เลือก — แตะเพื่อเลือกรายการ';
        el.classList.add('empty');
      }
    });
  }

  function openPicker(type) {
    currentPickerType = type;
    document.getElementById('popup-title').textContent = PICKER_CONFIG[type].title;
    document.getElementById('popup-search').value = '';
    document.getElementById('popup-overlay').classList.add('show');
    document.getElementById('popup-sheet').classList.add('show');
    renderPickerList();
  }

  function closePicker() {
    document.getElementById('popup-overlay').classList.remove('show');
    document.getElementById('popup-sheet').classList.remove('show');
    currentPickerType = null;
    updateAllSummaries();
  }

  function clearPicker() {
    if(!currentPickerType) return;
    if(currentPickerType === 'material') selectedMaterials = [];
    else if(currentPickerType === 'cause') selectedCauses = [];
    else selectedFixes = [];
    renderPickerList();
  }

  function filterPicker() {
    renderPickerList();
  }

  function renderPickerList() {
    const type = currentPickerType;
    if(!type) return;
    const query = document.getElementById('popup-search').value.trim().toLowerCase();
    const allOptions = getAllOptions(type);
    const filtered = allOptions.filter(opt => opt.toLowerCase().includes(query));
    const listEl = document.getElementById('popup-list');
    const hasQty = PICKER_CONFIG[type].hasQty;

    if(!filtered.length) {
      const canAddNew = query.length > 0;
      listEl.innerHTML = `<div class="popup-empty">ไม่พบรายการ${canAddNew?' — กดปุ่ม "เพิ่ม" ด้านบนเพื่อเพิ่ม "'+escapeHtml(query)+'"':''}</div>`;
      return;
    }

    listEl.innerHTML = filtered.map(opt => {
      const checked = isSelected(type, opt);
      const qtyRow = (hasQty && checked) ? (() => {
        const m = selectedMaterials.find(x => x.name === opt);
        return `<div class="popup-qty-row">
          <input type="number" min="0" step="0.1" value="${m.qty}" data-qty-for="${escapeAttr(opt)}">
          <span class="qty-unit">${escapeHtml(m.unit)}</span>
        </div>`;
      })() : '';
      return `
        <div class="popup-item-wrap">
          <div class="popup-item ${checked?'checked':''}" data-item="${escapeAttr(opt)}">
            <div class="popup-checkbox">${checked?'✓':''}</div>
            <div class="popup-item-label">${escapeHtml(opt)}</div>
          </div>
          ${qtyRow}
        </div>
      `;
    }).join('');

    listEl.querySelectorAll('.popup-item').forEach(row => {
      row.addEventListener('click', () => {
        toggleSelection(type, row.dataset.item);
        renderPickerList();
      });
    });
    listEl.querySelectorAll('[data-qty-for]').forEach(inp => {
      inp.addEventListener('click', e => e.stopPropagation());
      inp.addEventListener('input', () => {
        updateMaterialQty(inp.dataset.qtyFor, parseFloat(inp.value));
      });
    });
  }

  function addCustomItem() {
    if(!currentPickerType) return;
    const searchInput = document.getElementById('popup-search');
    const val = searchInput.value.trim();
    if(!val) return;
    const type = currentPickerType;
    if(getAllOptions(type).includes(val)) {
      // มีอยู่แล้ว แค่ติ๊กเลือกให้แทนที่จะเพิ่มซ้ำ
      if(!isSelected(type, val)) toggleSelection(type, val);
      searchInput.value = '';
      renderPickerList();
      return;
    }
    if(type === 'cause') customCauses.push(val);
    else if(type === 'fix') customFixes.push(val);
    toggleSelection(type, val);
    searchInput.value = '';
    renderPickerList();
  }
  window.addCustomItem = addCustomItem;

  // กด Enter ในช่องค้นหา = เพิ่มรายการใหม่ (ปุ่ม "เพิ่ม" ข้างๆ คือทางหลักที่เชื่อถือได้บนมือถือทุกรุ่น
  // ส่วน Enter เป็นทางลัดเสริมสำหรับคีย์บอร์ดที่รายงาน key event ถูกต้อง)
  document.addEventListener('DOMContentLoaded', () => {
    const searchInput = document.getElementById('popup-search');
    if(searchInput) {
      searchInput.addEventListener('keyup', (e) => {
        if(e.key !== 'Enter' || !currentPickerType) return;
        e.preventDefault();
        addCustomItem();
      });
    }
  });

  async function saveRepairDetails() {
    const saveBtn = document.getElementById('save-repair-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'กำลังบันทึก...';
    try {
      await updateDoc(doc(db, "tickets", currentDocId), {
        causes: selectedCauses,
        customCauses,
        fixes: selectedFixes,
        customFixes,
        materials: selectedMaterials
      });
      showToast('บันทึกรายละเอียดการซ่อมเรียบร้อย ✓', 'success');
    } catch(e) {
      console.error(e);
      showToast('บันทึกไม่สำเร็จ กรุณาลองใหม่', 'error');
    }
    saveBtn.disabled = false;
    saveBtn.textContent = '💾 บันทึกรายละเอียดการซ่อม';
  }

  let currentDocId = null;
  let currentData = null;

  async function loadTicket() {
    if(!ticketId || !token) {
      renderError('ลิงก์ไม่ถูกต้อง', 'ไม่พบรหัส ticket หรือ token ใน URL กรุณาตรวจสอบลิงก์อีกครั้ง');
      return;
    }
    try {
      const q = query(collection(db, "tickets"), where("id", "==", ticketId));
      const snap = await getDocs(q);
      if(snap.empty) {
        renderError('ไม่พบ Ticket นี้', `รหัส ${ticketId} อาจถูกลบหรือไม่มีอยู่จริง`);
        return;
      }
      // หาก id ซ้ำกันหลาย ticket (เกิดจาก bug ตัวนับ id เดิม) ให้เลือกอันที่ token ตรงกับลิงก์จริงๆ
      // แทนที่จะหยิบตัวแรกที่เจอ ซึ่งอาจไม่ใช่ ticket ที่ลิงก์นี้ถูกสร้างมาให้
      const docSnap = snap.docs.find(d => d.data().token === token) || snap.docs[0];
      const data = docSnap.data();
      if(!data.token || data.token !== token) {
        renderError('ไม่มีสิทธิ์เข้าถึง', 'Token ไม่ถูกต้อง กรุณาใช้ลิงก์ที่ได้รับจากระบบเท่านั้น');
        return;
      }
      currentDocId = docSnap.id;
      currentData = data;
      // โหลดข้อมูลซ่อมบำรุงเดิม (ถ้ามี) เข้า state
      selectedCauses = data.causes || [];
      // รองรับข้อมูลเก่า: customCause เคยเป็น string เดี่ยว ตอนนี้เปลี่ยนเป็น customCauses array
      customCauses = data.customCauses || (data.customCause ? [data.customCause] : []);
      if(data.customCause && !selectedCauses.includes(data.customCause)) selectedCauses.push(data.customCause);
      selectedFixes = data.fixes || [];
      customFixes = data.customFixes || (data.customFix ? [data.customFix] : []);
      if(data.customFix && !selectedFixes.includes(data.customFix)) selectedFixes.push(data.customFix);
      selectedMaterials = data.materials || [];
      renderTicket(data);
    } catch(e) {
      console.error(e);
      renderError('เกิดข้อผิดพลาด', 'ไม่สามารถโหลดข้อมูลได้ กรุณาลองใหม่อีกครั้ง');
    }
  }

  function renderTicket(t) {
    const statusClass = t.status === 'open' ? 'status-open' : t.status === 'progress' ? 'status-progress' : 'status-done';
    const mapLink = (t.lat && t.lng) ? `<a class="map-link" href="https://www.google.com/maps?q=${t.lat},${t.lng}" target="_blank">📍 เปิดแผนที่นำทาง</a>` : '';
    body.innerHTML = `
      <div class="ticket-id-row">
        <span class="ticket-id">${t.id}</span>
        <span class="status-pill ${statusClass}" id="status-pill">${statusLabel(t.status)}</span>
      </div>
      <div class="info-grid">
        <div class="info-item">
          <div class="info-key">ผู้แจ้ง</div>
          <div class="info-val">${t.name}</div>
        </div>
        <div class="info-item">
          <div class="info-key">CA / PEANO</div>
          <div class="info-val mono">${t.ca} / ${t.peano}</div>
        </div>
        <div class="info-item">
          <div class="info-key">ที่อยู่</div>
          <div class="info-val">${t.addr}${mapLink}</div>
        </div>
        <div class="info-item">
          <div class="info-key">เหตุการณ์</div>
          <div class="info-val">${t.note}</div>
        </div>
        <div class="info-item">
          <div class="info-key">เบอร์โทรผู้แจ้ง</div>
          <div class="info-val mono">${t.tel || '—'}</div>
        </div>
      </div>
      <div class="section-label">เปลี่ยนสถานะ</div>
      <div class="status-buttons" id="status-buttons">
        ${renderStatusButtons(t.status)}
      </div>

      <div class="repair-section">
        <div class="field-group">
          <div class="field-label">สาเหตุที่ทำให้ไฟฟ้าขัดข้อง</div>
          <div class="picker-box" id="picker-cause" onclick="openPicker('cause')">
            <div class="picker-text" id="summary-cause"></div>
            <div class="picker-plus">+</div>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label">วิธีแก้ไข</div>
          <div class="picker-box" id="picker-fix" onclick="openPicker('fix')">
            <div class="picker-text" id="summary-fix"></div>
            <div class="picker-plus">+</div>
          </div>
        </div>

        <div class="field-group">
          <div class="field-label">วัสดุ/อุปกรณ์ที่ใช้</div>
          <div class="picker-box" id="picker-material" onclick="openPicker('material')">
            <div class="picker-text" id="summary-material"></div>
            <div class="picker-plus">+</div>
          </div>
        </div>

        <button class="save-btn" id="save-repair-btn">💾 บันทึกรายละเอียดการซ่อม</button>
      </div>
    `;
    attachButtonHandlers();
    updateAllSummaries();
    document.getElementById('save-repair-btn').addEventListener('click', saveRepairDetails);
  }

  function escapeAttr(s) {
    return (s||'').replace(/"/g,'&quot;');
  }

  function escapeHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderStatusButtons(current) {
    const opts = [
      {key:'open', dot:'dot-open', label:'รอดำเนินการ'},
      {key:'progress', dot:'dot-progress', label:'กำลังดำเนินการ'},
      {key:'done', dot:'dot-done', label:'แก้ไขแล้ว'}
    ];
    return opts.map(o => `
      <button class="status-btn ${o.key===current?'current':''}" data-status="${o.key}">
        <span class="dot ${o.dot}"></span>
        ${o.label}
        ${o.key===current?'<span class="check">✓</span>':''}
      </button>
    `).join('');
  }

  function attachButtonHandlers() {
    document.querySelectorAll('.status-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const newStatus = btn.dataset.status;
        if(newStatus === currentData.status) return;
        btn.disabled = true;
        try {
          await updateDoc(doc(db, "tickets", currentDocId), { status: newStatus });
          currentData.status = newStatus;
          document.getElementById('status-buttons').innerHTML = renderStatusButtons(newStatus);
          document.getElementById('status-pill').textContent = statusLabel(newStatus);
          document.getElementById('status-pill').className = 'status-pill ' + (newStatus==='open'?'status-open':newStatus==='progress'?'status-progress':'status-done');
          attachButtonHandlers();
          showToast('อัปเดตสถานะเรียบร้อย ✓', 'success');
        } catch(e) {
          console.error(e);
          showToast('อัปเดตไม่สำเร็จ กรุณาลองใหม่', 'error');
          btn.disabled = false;
        }
      });
    });
  }

  function attachRepairHandlers() {
    // เก็บไว้เป็น no-op เผื่อมีโค้ดอ้างอิงเก่า — logic จริงทั้งหมดย้ายไปอยู่ใน popup picker functions แล้ว
  }

  window.openPicker = openPicker;
  window.closePicker = closePicker;
  window.clearPicker = clearPicker;
  window.filterPicker = filterPicker;

  loadTicket();
</script>
</body>
</html>
