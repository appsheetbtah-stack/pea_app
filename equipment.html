<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อุปกรณ์ในระบบจำหน่าย - PEA</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1923">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="equipment-data.js"></script>
<style>
:root {
  --bg:#0f1923; --surface:#162030; --surface2:#1e2d3d; --border:#2a3f55;
  --accent:#f5a623; --blue:#3b9ede; --green:#2ecc71; --red:#e74c3c;
  --yellow:#f39c12; --purple:#9b59b6; --cyan:#00b4d8;
  --text:#e8f0f8; --text2:#8aa0b8;
  --mono:'IBM Plex Mono',monospace; --sans:'Sarabun',sans-serif;
  --topbar:52px; --botnav:56px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:15px; }

/* ── TOPBAR ── */
.topbar {
  position:fixed; top:0; left:0; right:0; height:var(--topbar); z-index:600;
  background:var(--surface); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px; padding:0 16px;
}
.back-btn {
  color:var(--text2); text-decoration:none; font-size:13px;
  display:flex; align-items:center; gap:4px;
  padding:6px 10px; border:1px solid var(--border); border-radius:6px;
  flex-shrink:0; transition:color .15s;
}
.back-btn:hover { color:var(--accent); border-color:var(--accent); }
.topbar-title { font-size:15px; font-weight:700; flex:1; text-align:center; }
.topbar-badge {
  font-family:var(--mono); font-size:11px; color:var(--text2);
  background:var(--surface2); padding:3px 8px; border-radius:10px; flex-shrink:0;
}

/* ── TAB CONTENT ── */
.tab-pane {
  position:fixed; top:var(--topbar); left:0; right:0; bottom:var(--botnav);
  overflow-y:auto; display:none;
}
.tab-pane.active { display:block; }
.tab-pane.map-pane { display:none; overflow:hidden; flex-direction:column; }
.tab-pane.map-pane.active { display:flex; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; height:var(--botnav); z-index:600;
  background:var(--surface); border-top:1px solid var(--border);
  display:flex;
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; background:none; border:none; color:var(--text2);
  cursor:pointer; font-family:var(--sans); transition:color .15s; padding:0;
  position:relative;
}
.nav-btn.active { color:var(--accent); }
.nav-btn.active::after {
  content:''; position:absolute; top:0; left:20%; right:20%; height:2px;
  background:var(--accent); border-radius:0 0 2px 2px;
}
.nav-icon { font-size:20px; line-height:1; }
.nav-label { font-size:11px; font-weight:600; }

/* ── DASHBOARD ── */
.db-wrap { padding:14px 14px 20px; display:flex; flex-direction:column; gap:14px; }

.db-stat-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.db-stat-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px;
  padding:14px 16px; position:relative; overflow:hidden;
}
.db-stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--c,var(--accent)); }
.db-stat-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.7px; margin-bottom:8px; }
.db-stat-value { font-family:var(--mono); font-size:30px; font-weight:600; color:var(--text); line-height:1; }
.db-stat-unit { font-size:11.5px; color:var(--text2); margin-top:5px; }

.db-chart-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.db-chart-card {
  background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px;
}
.db-chart-title { font-size:11px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:0.7px; margin-bottom:12px; }

.bd-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.bd-row:last-child { margin-bottom:0; }
.bd-label { font-size:12px; color:var(--text2); width:90px; flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bd-bar-wrap { flex:1; background:var(--surface2); border-radius:4px; height:7px; overflow:hidden; }
.bd-bar { height:100%; border-radius:4px; transition:width .4s ease; }
.bd-count { font-family:var(--mono); font-size:12px; color:var(--text); min-width:28px; text-align:right; }

.kva-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.kva-item { background:var(--surface2); border-radius:7px; padding:8px 10px; display:flex; align-items:center; justify-content:space-between; }
.kva-label { font-size:12px; color:var(--text2); }
.kva-count { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--blue); }

/* ── MAP TAB ── */
.map-chips {
  flex-shrink:0; display:flex; gap:8px; padding:10px 14px;
  overflow-x:auto; background:var(--surface); border-bottom:1px solid var(--border);
}
.map-chips::-webkit-scrollbar { display:none; }
.chip {
  flex-shrink:0; padding:6px 14px; border-radius:20px; font-size:12.5px;
  font-weight:600; cursor:pointer; border:1px solid var(--border);
  background:var(--surface2); color:var(--text2); font-family:var(--sans);
  transition:all .15s; white-space:nowrap;
}
.chip.active { border-color:var(--c,var(--accent)); color:var(--c,var(--accent)); background:color-mix(in srgb,var(--c,var(--accent)) 15%,transparent); }

.map-legend {
  flex-shrink:0; display:flex; flex-wrap:wrap; gap:8px; padding:8px 14px;
  background:var(--bg); border-bottom:1px solid var(--border);
}
.leg { display:flex; align-items:center; gap:4px; font-size:11.5px; color:var(--text2); }
.leg-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
#map { flex:1; }
.map-control-row { flex-shrink:0; padding:0 14px 10px; }
.btn-locate {
  width:100%; padding:10px 14px; border-radius:8px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text); font-family:var(--sans); font-size:13.5px;
  font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px;
}
.btn-locate:active { border-color:var(--accent); color:var(--accent); }
.btn-locate.loading { opacity:.6; }

/* ── SEARCH TAB ── */
.search-wrap { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
.sel-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.sel-grid select, .search-input {
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  font-family:var(--sans); font-size:13px; padding:9px 10px; border-radius:8px;
  outline:none; width:100%;
}
.sel-grid select:focus, .search-input:focus { border-color:var(--accent); }
.search-input { padding:10px 12px; font-size:14px; }

.result-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 2px;
}
.result-count { font-size:13px; color:var(--text2); }
.clear-btn {
  font-size:12px; color:var(--text2); background:none;
  border:1px solid var(--border); border-radius:6px; padding:5px 12px;
  cursor:pointer; font-family:var(--sans);
}
.clear-btn:active { color:var(--accent); border-color:var(--accent); }

.tbl-wrap { border:1px solid var(--border); border-radius:8px; overflow:hidden; }
table { width:100%; border-collapse:collapse; font-size:13px; }
th {
  background:var(--surface2); padding:10px 12px; text-align:left;
  font-size:11.5px; font-weight:600; color:var(--text2); white-space:nowrap;
  border-bottom:1px solid var(--border);
}
td { padding:9px 12px; border-bottom:1px solid var(--border); vertical-align:top; word-break:break-word; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:var(--surface2); cursor:pointer; }
tr.active-row td { background:rgba(245,166,35,.1); }

.type-pill {
  display:inline-block; font-size:11px; font-weight:600;
  padding:2px 8px; border-radius:10px; white-space:nowrap;
}
.t-id { font-family:var(--mono); font-size:12px; color:var(--accent); }
.t-sub { font-size:11.5px; color:var(--text2); margin-top:2px; }
.t-kva { font-family:var(--mono); font-size:13px; color:var(--blue); }

.pagination {
  display:flex; align-items:center; justify-content:space-between;
  padding:2px 0;
}
.pg-info { font-family:var(--mono); font-size:12px; color:var(--text2); }
.pg-btns { display:flex; gap:6px; }
.pg-btn {
  width:32px; height:32px; border-radius:6px; border:1px solid var(--border);
  background:var(--surface2); color:var(--text); font-size:14px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.pg-btn:disabled { opacity:.35; cursor:not-allowed; }
.pg-btn:not(:disabled):active { border-color:var(--accent); color:var(--accent); }

/* ── POPUP ── */
.leaflet-popup-content-wrapper {
  background:var(--surface); color:var(--text);
  border:1px solid var(--border); border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.leaflet-popup-tip { background:var(--surface); }
.leaflet-popup-content { margin:10px 14px; font-family:var(--sans); font-size:13px; line-height:1.6; }
.popup-title { font-weight:700; color:var(--accent); font-family:var(--mono); margin-bottom:6px; }
.popup-row { display:flex; gap:8px; }
.popup-lbl { color:var(--text2); flex-shrink:0; min-width:64px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a class="back-btn" href="index.html">← กลับ</a>
  <span class="topbar-title">⚡ อุปกรณ์ในระบบจำหน่าย</span>
  <span class="topbar-badge" id="total-badge">—</span>
</div>

<!-- TAB: DASHBOARD -->
<div class="tab-pane active" id="pane-dashboard">
  <div class="db-wrap" id="db-wrap">
    <div style="text-align:center;padding:40px;color:var(--text2)">กำลังโหลด...</div>
  </div>
</div>

<!-- TAB: MAP -->
<div class="tab-pane map-pane" id="pane-map">
  <div class="map-chips" id="map-chips">
    <button class="chip active" style="--c:var(--accent)" data-f="" onclick="setMapFilter(this,'')">ทั้งหมด</button>
    <button class="chip" style="--c:var(--red)" data-f="recloser" onclick="setMapFilter(this,'recloser')">🔴 Recloser</button>
    <button class="chip" style="--c:var(--accent)" data-f="fuse" onclick="setMapFilter(this,'fuse')">🟡 Fuse Dropout</button>
    <button class="chip" style="--c:var(--yellow)" data-f="disc" onclick="setMapFilter(this,'disc')">🟠 Disconnecting</button>
    <button class="chip" style="--c:var(--green)" data-f="lbs" onclick="setMapFilter(this,'lbs')">🟢 LBS SF6</button>
    <button class="chip" style="--c:var(--blue)" data-f="tx-pea-1" onclick="setMapFilter(this,'tx-pea-1')">🔵 Tx PEA 1Ph</button>
    <button class="chip" style="--c:var(--cyan)" data-f="tx-pea-3" onclick="setMapFilter(this,'tx-pea-3')">🩵 Tx PEA 3Ph</button>
    <button class="chip" style="--c:var(--purple)" data-f="tx-cust" onclick="setMapFilter(this,'tx-cust')">🟣 Tx Customer</button>
  </div>
  <div class="map-legend">
    <div class="leg"><div class="leg-dot" style="background:#e74c3c"></div>Recloser</div>
    <div class="leg"><div class="leg-dot" style="background:#f5a623"></div>Fuse</div>
    <div class="leg"><div class="leg-dot" style="background:#f39c12"></div>Disc.</div>
    <div class="leg"><div class="leg-dot" style="background:#2ecc71"></div>LBS</div>
    <div class="leg"><div class="leg-dot" style="background:#3b9ede"></div>Tx PEA 1Ph</div>
    <div class="leg"><div class="leg-dot" style="background:#00b4d8"></div>Tx PEA 3Ph</div>
    <div class="leg"><div class="leg-dot" style="background:#9b59b6"></div>Tx Cust</div>
  </div>
  <div class="map-control-row">
    <button class="btn-locate" id="btn-locate-eq" onclick="locateMe()">📍 ตำแหน่งของฉัน</button>
  </div>
  <div id="map"></div>
</div>

<!-- TAB: SEARCH -->
<div class="tab-pane" id="pane-search">
  <div class="search-wrap">
    <div class="sel-grid">
      <select id="sel-type" onchange="doSearch()">
        <option value="">ทุกประเภท</option>
        <option value="recloser">Recloser</option>
        <option value="fuse">Fuse Dropout</option>
        <option value="disc">Disconnecting</option>
        <option value="lbs">LBS SF6</option>
        <option value="tx-pea-1">Tx PEA 1Phase</option>
        <option value="tx-pea-3">Tx PEA 3Phase</option>
        <option value="tx-cust-1">Tx Customer 1Phase</option>
        <option value="tx-cust-3">Tx Customer 3Phase</option>
      </select>
      <select id="sel-feeder" onchange="doSearch()">
        <option value="">ทุกสายป้อน</option>
        <option value="PLZ03">PLZ03</option>
        <option value="LKA02">LKA02</option>
      </select>
      <select id="sel-owner" onchange="doSearch()">
        <option value="">เจ้าของทั้งหมด</option>
        <option value="PEA">PEA</option>
        <option value="Customer">Customer</option>
      </select>
      <select id="sel-kva" onchange="doSearch()">
        <option value="">kVA ทั้งหมด</option>
        <option value="10">10 kVA</option>
        <option value="20">20 kVA</option>
        <option value="30">30 kVA</option>
        <option value="50">50 kVA</option>
        <option value="100">100 kVA</option>
        <option value="160">160 kVA</option>
        <option value="250">250 kVA</option>
        <option value="315">315 kVA</option>
        <option value="500">500 kVA</option>
        <option value="800">800 kVA</option>
      </select>
    </div>
    <input class="search-input" id="search-q" type="search" placeholder="🔍  ค้นหา รหัส / PEANO / สถานที่..." oninput="doSearch()">
    <div class="result-bar">
      <span class="result-count" id="result-count">—</span>
      <button class="clear-btn" onclick="clearSearch()">✕ ล้างตัวกรอง</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>ประเภท</th>
          <th>รหัส / PEANO</th>
          <th>รายละเอียด</th>
          <th>kVA</th>
        </tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="pg-info" id="pg-info">—</span>
      <div class="pg-btns">
        <button class="pg-btn" id="btn-prev" onclick="changePg(-1)">‹</button>
        <button class="pg-btn" id="btn-next" onclick="changePg(1)">›</button>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="btn-tab-dashboard" onclick="switchTab('dashboard')">
    <span class="nav-icon">📊</span>
    <span class="nav-label">แดชบอร์ด</span>
  </button>
  <button class="nav-btn" id="btn-tab-map" onclick="switchTab('map')">
    <span class="nav-icon">🗺️</span>
    <span class="nav-label">แผนที่</span>
  </button>
  <button class="nav-btn" id="btn-tab-search" onclick="switchTab('search')">
    <span class="nav-icon">🔍</span>
    <span class="nav-label">ค้นหา</span>
  </button>
</nav>

<script>
// ── DATA ──────────────────────────────────────
const DATA = (typeof EQUIPMENT !== 'undefined') ? EQUIPMENT : [];
document.getElementById('total-badge').textContent = DATA.length + ' รายการ';

// ── HELPERS ───────────────────────────────────
function getColor(d) {
  if (d.tp === 'recloser') return '#e74c3c';
  if (d.tp === 'switch') {
    if (d.st === 'Fuse Dropout') return '#f5a623';
    if (d.st === 'Disconnecting') return '#f39c12';
    if (d.st.includes('LoadBreak') || d.st.includes('LBS')) return '#2ecc71';
    return '#f5a623';
  }
  if (d.tp === 'transformer') {
    if (d.own === 'Customer') return '#9b59b6';
    return d.st.includes('3') ? '#00b4d8' : '#3b9ede';
  }
  return '#8aa0b8';
}

function getTypeLabel(d) {
  if (d.tp === 'recloser') return 'Recloser';
  if (d.tp === 'switch') return d.st || 'Switch';
  if (d.tp === 'transformer') return 'Tx ' + (d.st.includes('3') ? '3Ph' : '1Ph') + ' ' + (d.own||'');
  return d.tp;
}

function matchFilter(d, f) {
  if (!f) return true;
  if (f === 'recloser') return d.tp === 'recloser';
  if (f === 'fuse')   return d.tp === 'switch' && d.st === 'Fuse Dropout';
  if (f === 'disc')   return d.tp === 'switch' && d.st === 'Disconnecting';
  if (f === 'lbs')    return d.tp === 'switch' && (d.st.includes('LoadBreak') || d.st.includes('LBS'));
  if (f === 'tx-pea-1') return d.tp === 'transformer' && d.own === 'PEA' && d.st.includes('1');
  if (f === 'tx-pea-3') return d.tp === 'transformer' && d.own === 'PEA' && d.st.includes('3');
  if (f === 'tx-cust')  return d.tp === 'transformer' && d.own === 'Customer';
  if (f === 'tx-cust-1') return d.tp === 'transformer' && d.own === 'Customer' && d.st.includes('1');
  if (f === 'tx-cust-3') return d.tp === 'transformer' && d.own === 'Customer' && d.st.includes('3');
  return true;
}

function buildPopup(d) {
  const title = `<div class="popup-title">${getTypeLabel(d)}</div>`;
  if (d.tp === 'recloser') return title +
    `<div class="popup-row"><span class="popup-lbl">รหัส</span><b style="color:var(--accent)">${d.id}</b></div>
     <div class="popup-row"><span class="popup-lbl">ฉนวน</span>${d.st}</div>
     <div class="popup-row"><span class="popup-lbl">เฟส</span>${d.ph}</div>`;
  if (d.tp === 'switch') return title +
    `<div class="popup-row"><span class="popup-lbl">รหัส</span><b style="color:var(--accent)">${d.id}</b></div>
     <div class="popup-row"><span class="popup-lbl">ประเภท</span>${d.st}</div>
     <div class="popup-row"><span class="popup-lbl">เฟส</span>${d.ph}</div>
     <div class="popup-row"><span class="popup-lbl">สายป้อน</span>${d.fd}</div>
     ${d.loc ? `<div class="popup-row"><span class="popup-lbl">สถานที่</span>${d.loc}</div>` : ''}`;
  return title +
    `<div class="popup-row"><span class="popup-lbl">PEANO</span><b style="color:var(--accent)">${d.id}</b></div>
     <div class="popup-row"><span class="popup-lbl">ระบบเฟส</span>${d.st}</div>
     <div class="popup-row"><span class="popup-lbl">kVA</span><b style="color:var(--blue)">${d.kva} kVA</b></div>
     <div class="popup-row"><span class="popup-lbl">เจ้าของ</span>${d.own}</div>
     <div class="popup-row"><span class="popup-lbl">ผู้ใช้ไฟ</span>${d.ut}</div>
     ${d.loc ? `<div class="popup-row"><span class="popup-lbl">สถานที่</span>${d.loc}</div>` : ''}
     ${d.it ? `<div class="popup-row"><span class="popup-lbl">ติดตั้ง</span><small>${d.it}</small></div>` : ''}`;
}

// ── TAB SWITCHING ─────────────────────────────
let currentTab = 'dashboard';
function switchTab(tab) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-' + tab).classList.add('active');
  document.getElementById('btn-tab-' + tab).classList.add('active');
  currentTab = tab;
  if (tab === 'map' && !mapReady) initMap();
}

// ── DASHBOARD ─────────────────────────────────
function count(arr) {
  const m = {};
  arr.forEach(v => m[v] = (m[v]||0) + 1);
  return m;
}
function barRow(label, n, total, color) {
  const pct = total ? Math.round(n / total * 100) : 0;
  return `<div class="bd-row">
    <div class="bd-label">${label}</div>
    <div class="bd-bar-wrap"><div class="bd-bar" style="width:${pct}%;background:${color}"></div></div>
    <div class="bd-count">${n}</div>
  </div>`;
}

function renderDashboard() {
  const rec = DATA.filter(d => d.tp === 'recloser');
  const sw  = DATA.filter(d => d.tp === 'switch');
  const tx  = DATA.filter(d => d.tp === 'transformer');

  const swTypes = count(sw.map(d => d.st));
  const txOwner = count(tx.map(d => d.own));
  const txPhase = count(tx.map(d => d.st.includes('3') ? '3 Phase' : '1 Phase'));
  const txKva   = count(tx.map(d => d.kva));

  const sortedKva = Object.entries(txKva)
    .filter(([k]) => k)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 8);

  document.getElementById('db-wrap').innerHTML = `
    <!-- STAT CARDS 4 ใบ -->
    <div class="db-stat-grid">
      <div class="db-stat-card" style="--c:var(--accent)">
        <div class="db-stat-label">อุปกรณ์ทั้งหมด</div>
        <div class="db-stat-value">${DATA.length}</div>
        <div class="db-stat-unit">รายการ</div>
      </div>
      <div class="db-stat-card" style="--c:#e74c3c">
        <div class="db-stat-label">Recloser</div>
        <div class="db-stat-value" style="color:#e74c3c">${rec.length}</div>
        <div class="db-stat-unit">เครื่อง</div>
      </div>
      <div class="db-stat-card" style="--c:var(--accent)">
        <div class="db-stat-label">Switch</div>
        <div class="db-stat-value" style="color:var(--accent)">${sw.length}</div>
        <div class="db-stat-unit">เครื่อง</div>
      </div>
      <div class="db-stat-card" style="--c:var(--blue)">
        <div class="db-stat-label">Transformer</div>
        <div class="db-stat-value" style="color:var(--blue)">${tx.length}</div>
        <div class="db-stat-unit">เครื่อง</div>
      </div>
    </div>

    <!-- CHART ROW 1: Switch + Transformer เจ้าของ -->
    <div class="db-chart-grid">
      <div class="db-chart-card">
        <div class="db-chart-title">Switch ตามประเภท</div>
        ${barRow('Fuse Dropout',  swTypes['Fuse Dropout']||0,  sw.length, '#f5a623')}
        ${barRow('Disconnecting', swTypes['Disconnecting']||0, sw.length, '#f39c12')}
        ${barRow('LBS SF6',       swTypes['LoadBreak Switch SF6']||0, sw.length, '#2ecc71')}
      </div>
      <div class="db-chart-card">
        <div class="db-chart-title">Transformer เจ้าของ</div>
        ${barRow('PEA',      txOwner['PEA']||0,      tx.length, '#3b9ede')}
        ${barRow('Customer', txOwner['Customer']||0,  tx.length, '#9b59b6')}
        <div style="height:10px"></div>
        <div class="db-chart-title">ระบบเฟส</div>
        ${barRow('1 Phase', txPhase['1 Phase']||0, tx.length, '#3b9ede')}
        ${barRow('3 Phase', txPhase['3 Phase']||0, tx.length, '#00b4d8')}
      </div>
    </div>

    <!-- CHART ROW 2: kVA -->
    <div class="db-chart-card">
      <div class="db-chart-title">ขนาด kVA (เรียงตามจำนวน)</div>
      <div class="kva-grid">
        ${sortedKva.map(([k,v]) => `
          <div class="kva-item">
            <span class="kva-label">${k} kVA</span>
            <span class="kva-count">${v}</span>
          </div>`).join('')}
      </div>
    </div>
  `;
}

// ── MAP ───────────────────────────────────────
let map, cluster, mapReady = false, mapFilter = '';
let mapMarkers = []; // {data, marker}
let myLocationMarker = null;

function locateMe() {
  if (!mapReady) return;
  if (!navigator.geolocation) {
    alert('เบราว์เซอร์นี้ไม่รองรับ GPS');
    return;
  }
  const btn = document.getElementById('btn-locate-eq');
  btn.classList.add('loading');
  btn.textContent = '📍 กำลังค้นหา...';

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      if (myLocationMarker) map.removeLayer(myLocationMarker);

      const icon = L.divIcon({
        className: '',
        html: `<div style="width:16px;height:16px;border-radius:50%;background:#3b9ede;border:3px solid #fff;box-shadow:0 0 0 4px rgba(59,158,222,0.35);"></div>`,
        iconSize: [16,16], iconAnchor: [8,8]
      });
      myLocationMarker = L.marker([latitude, longitude], { icon, zIndexOffset: 1000 })
        .addTo(map)
        .bindPopup('📍 ตำแหน่งของฉัน');
      map.setView([latitude, longitude], 16);
      myLocationMarker.openPopup();
      btn.classList.remove('loading');
      btn.textContent = '📍 ตำแหน่งของฉัน';
    },
    (err) => {
      btn.classList.remove('loading');
      btn.textContent = '📍 ตำแหน่งของฉัน';
      if (err.code === 1) alert('กรุณาอนุญาตการเข้าถึงตำแหน่ง (GPS) ในเบราว์เซอร์');
      else alert('ไม่สามารถระบุตำแหน่งได้ กรุณาลองใหม่');
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

function initMap() {
  map = L.map('map').setView([16.80, 99.98], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);
  cluster = L.markerClusterGroup({ maxClusterRadius: 40, showCoverageOnHover: false });
  cluster.addTo(map);
  mapReady = true;
  renderMapMarkers();
}

function renderMapMarkers() {
  cluster.clearLayers();
  mapMarkers = [];
  DATA.forEach(d => {
    if (!d.la || !d.ln) { mapMarkers.push(null); return; }
    if (!matchFilter(d, mapFilter)) { mapMarkers.push(null); return; }
    const m = L.circleMarker([d.la, d.ln], {
      radius: d.tp === 'recloser' ? 10 : d.tp === 'switch' ? 7 : 5,
      color: '#0f1923', weight: 1.5,
      fillColor: getColor(d), fillOpacity: 0.9
    }).bindPopup(buildPopup(d), { maxWidth: 240 });
    cluster.addLayer(m);
    mapMarkers.push({ d, m });
  });
}

function setMapFilter(el, f) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  mapFilter = f;
  if (mapReady) renderMapMarkers();
}

function zoomToItem(d) {
  switchTab('map');
  if (!mapReady) {
    setTimeout(() => { initMap(); doZoom(d); }, 300);
  } else { doZoom(d); }
}
function doZoom(d) {
  if (!d.la || !d.ln) return;
  const found = mapMarkers.find(x => x && x.d.id === d.id && x.d.tp === d.tp);
  if (found) {
    cluster.zoomToShowLayer(found.m, () => {
      map.setView([d.la, d.ln], 16);
      found.m.openPopup();
    });
  } else {
    map.setView([d.la, d.ln], 16);
  }
}

// ── SEARCH ────────────────────────────────────
let searchFiltered = [...DATA];
let pg = 0;
const PER = 20;

function doSearch() {
  const tp   = document.getElementById('sel-type').value;
  const fd   = document.getElementById('sel-feeder').value;
  const own  = document.getElementById('sel-owner').value;
  const kva  = document.getElementById('sel-kva').value;
  const q    = document.getElementById('search-q').value.trim().toLowerCase();

  searchFiltered = DATA.filter(d => {
    if (tp && !matchFilter(d, tp)) return false;
    if (fd && d.fd !== fd) return false;
    if (own && d.own !== own) return false;
    if (kva && d.kva !== kva) return false;
    if (q) {
      const hay = (d.id + d.loc + d.st + d.fd + d.own + d.ut).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  pg = 0;
  renderTable();
}

function clearSearch() {
  ['sel-type','sel-feeder','sel-owner','sel-kva'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('search-q').value = '';
  searchFiltered = [...DATA];
  pg = 0;
  renderTable();
}

function renderTable() {
  const total = searchFiltered.length;
  const pages = Math.max(1, Math.ceil(total / PER));
  const s = pg * PER, e = Math.min(s + PER, total);
  const slice = searchFiltered.slice(s, e);

  document.getElementById('result-count').textContent = `พบ ${total} รายการ`;
  document.getElementById('pg-info').textContent = total ? `${s+1}–${e} / ${total}` : '0';
  document.getElementById('btn-prev').disabled = pg === 0;
  document.getElementById('btn-next').disabled = pg >= pages - 1;

  if (!slice.length) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="4" style="text-align:center;color:var(--text2);padding:24px">ไม่พบข้อมูล</td></tr>';
    return;
  }

  document.getElementById('tbody').innerHTML = slice.map((d, i) => {
    const gi = s + i;
    const color = getColor(d);
    const pill = `<span class="type-pill" style="background:${color}22;color:${color};border:1px solid ${color}44">${getTypeLabel(d)}</span>`;
    const sub = d.tp === 'switch'
      ? `<div class="t-sub">สายป้อน: ${d.fd}</div>`
      : d.tp === 'transformer'
      ? `<div class="t-sub">${d.ut}${d.it ? ' · ' + d.it.slice(0,14) : ''}</div>`
      : '';
    const loc = d.loc ? `<div class="t-sub">${d.loc.slice(0,36)}${d.loc.length>36?'…':''}</div>` : '';
    return `<tr data-gi="${gi}" onclick="rowClick(${gi})">
      <td>${pill}</td>
      <td><div class="t-id">${d.id||'—'}</div>${loc}</td>
      <td>${d.st}${sub}</td>
      <td class="t-kva">${d.kva||'—'}</td>
    </tr>`;
  }).join('');
}

function changePg(dir) {
  const pages = Math.max(1, Math.ceil(searchFiltered.length / PER));
  pg = Math.max(0, Math.min(pg + dir, pages - 1));
  renderTable();
}

function rowClick(gi) {
  document.querySelectorAll('#tbody tr').forEach(r => r.classList.remove('active-row'));
  const tr = document.querySelector(`#tbody tr[data-gi="${gi}"]`);
  if (tr) tr.classList.add('active-row');
  // reset map filter to show all, then zoom
  mapFilter = '';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelector('.chip[data-f=""]').classList.add('active');
  zoomToItem(searchFiltered[gi]);
}

// ── INIT ──────────────────────────────────────
renderDashboard();
doSearch();
</script>
</body>
</html>
